<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>生日快乐 🎂</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html, body {
    width: 100%;
    min-height: 100vh;
    background: #0b0512;
    color: #fff;
    font-family: "Microsoft YaHei", sans-serif;
    scroll-behavior: smooth;
  }

  body {
    padding: 15px;
    padding-bottom: 100px;
  }

  /* 标题 */
  .title {
    text-align: center;
    font-size: 34px;
    color: #ff85c2;
    margin: 30px 0;
    text-shadow: 0 0 12px #ff85c2;
    opacity: 0;
  }

  /* 轮播图容器：长条竖图专用，无滤镜 */
  .swiper {
    width: 100%;
    height: 550px;
    position: relative;
    border-radius: 24px;
    overflow: hidden;
    box-shadow: 0 0 30px rgba(255, 133, 194, 0.4);
    opacity: 0;
    transform: translateY(30px);
    /* 关键：取消任何滤镜效果 */
    filter: none;
  }

  .swiper img {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0;
    transition: opacity 1.2s;
    /* 关键：原图显示，不模糊 */
    image-rendering: crisp-edges;
  }

  .swiper img.active {
    opacity: 1;
  }

  /* 祝福语区块（可下滑） */
  .section {
    margin-top: 40px;
    text-align: center;
    font-size: 20px;
    line-height: 2;
    color: #f3f3f3;
    opacity: 0;
    transform: translateY(30px);
  }

  .section2 {
    margin-top: 30px;
    font-size: 17px;
    color: #ffc8e2;
    opacity: 0;
    transform: translateY(30px);
  }

  /* 烟花爱心 */
  .fire, .heart {
    position: fixed;
    pointer-events: none;
    z-index: 999;
  }
</style>
</head>

<body>

  <div class="title">🎂 生日快乐 🎂</div>

  <!-- 4张长条竖图 轮播区域（纯原图） -->
  <div class="swiper" id="swiper">
    <img src="photo1.jpg" class="active">
    <img src="photo2.jpg">
    <img src="photo3.jpg">
    <img src="photo4.jpg">
  </div>

  <!-- 下面内容可以下滑查看 -->
  <div class="section">
    愿你新的一岁<br>
    平安喜乐 万事胜意
  </div>

  <div class="section section2">
    眼里有光 心中有爱<br>
    生活明朗 万物可爱<br>
    岁岁常欢愉 年年皆胜意
  </div>

  <div class="section section2" style="margin-top:50px; color:#ff99cc">
    ❤️ 送给最可爱的你 ❤️
  </div>

<script>
  // 渐入动画
  const title = document.querySelector('.title');
  const swiper = document.querySelector('.swiper');
  const sections = document.querySelectorAll('.section');

  setTimeout(() => { title.style.transition = 'all 1s'; title.style.opacity = 1; }, 500);
  setTimeout(() => { swiper.style.transition = 'all 1.2s'; swiper.style.opacity = 1; swiper.style.transform = 'translateY(0)'; }, 1200);

  sections.forEach((el, i) => {
    setTimeout(() => {
      el.style.transition = 'all 1s';
      el.style.opacity = 1;
      el.style.transform = 'translateY(0)';
    }, 1800 + i * 300);
  });

  // 4张长条图自动轮播
  const imgs = document.querySelectorAll('#swiper img');
  let idx = 0;
  setInterval(() => {
    imgs[idx].classList.remove('active');
    idx = (idx + 1) % imgs.length;
    imgs[idx].classList.add('active');
  }, 3000);

  // 点击屏幕 = 烟花互动
  document.addEventListener('click', () => {
    for (let i = 0; i < 30; i++) {
      setTimeout(() => {
        const f = document.createElement('div');
        f.className = 'fire';
        f.style.width = '9px';
        f.style.height = '9px';
        f.style.borderRadius = '50%';
        const color = ['#ff85c2', '#ffda47', '#72e6ff', '#ff66b2'][Math.random() * 4 | 0];
        f.style.background = color;
        f.style.boxShadow = `0 0 20px ${color}`;
        f.style.left = Math.random() * window.innerWidth + 'px';
        f.style.top = Math.random() * window.innerHeight + 'px';
        document.body.appendChild(f);

        setTimeout(() => {
          f.style.transition = '0.8s';
          f.style.transform = 'scale(5)';
          f.style.opacity = 0;
        }, 20);
        setTimeout(() => f.remove(), 800);
      }, i * 30);
    }
  });

  // 爱心飘落
  setInterval(() => {
    const h = document.createElement('div');
    h.className = 'heart';
    h.innerText = '❤️';
    h.style.left = Math.random() * 100 + 'vw';
    h.style.top = '-10vh';
    h.style.fontSize = '18px';
    h.style.animation = 'fall 4.5s linear';
    document.body.appendChild(h);
    setTimeout(() => h.remove(), 4500);
  }, 200);

  const style = document.createElement('style');
  style.innerHTML = '@keyframes fall{0%{transform:translateY(0);opacity:1}100%{transform:translateY(120vh);opacity:0}}';
  document.head.appendChild(style);
</script>

</body>
</html>
